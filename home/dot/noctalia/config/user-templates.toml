[config]

[templates]

[templates.starship]
input_path = "/home/dot/.dotfiles/home/dot/starship/starship.toml.template"
output_path = "/home/dot/.cache/starship.toml"

[templates.zellij]
input_path = "/home/dot/.dotfiles/home/dot/zellij/config.kdl.template"
output_path = "/home/dot/.cache/zellij.kdl"

[templates.neovim]
input_path = "/home/dot/.dotfiles/home/dot/nixvim/colors.lua.template"
output_path = "/home/dot/.cache/nvim_colors.lua"

[templates.lazygit]
input_path = "/home/dot/.dotfiles/home/dot/cli-tools/lazygit-config.yml.template"
output_path = "/home/dot/.cache/lazygit.yml"

[templates.fcitx5_mellow_theme]
input_path = "/home/dot/.dotfiles/home/dot/fcitx5/templates/noctalia-mellow-sync/theme.conf.template"

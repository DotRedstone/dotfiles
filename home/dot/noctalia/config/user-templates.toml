output_path = "/home/dot/.local/share/fcitx5/themes/noctalia-inflex-sync/theme.conf"

[templates.fcitx5_inflex_panel]
input_path = "/home/dot/.dotfiles/home/dot/fcitx5/templates/noctalia-inflex-sync/panel.svg.template"
output_path = "/home/dot/.local/share/fcitx5/themes/noctalia-inflex-sync/panel.svg"

[templates.fcitx5_inflex_highlight]
input_path = "/home/dot/.dotfiles/home/dot/fcitx5/templates/noctalia-inflex-sync/highlight.svg.template"

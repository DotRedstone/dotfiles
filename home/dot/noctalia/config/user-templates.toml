output_path = "/home/dot/.local/share/fcitx5/themes/noctalia-mellow-dark-sync/panel.svg"

[templates.fcitx5_mellow_dark_highlight]
input_path = "/home/dot/.dotfiles/home/dot/fcitx5/templates/noctalia-mellow-dark-sync/highlight.svg.template"
output_path = "/home/dot/.local/share/fcitx5/themes/noctalia-mellow-dark-sync/highlight.svg"

[templates.fcitx5_inflex_theme]

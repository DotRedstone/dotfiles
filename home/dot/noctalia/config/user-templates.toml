[templates.fcitx5_inflex_dark_theme]
input_path = "/home/dot/.dotfiles/home/dot/fcitx5/templates/noctalia-inflex-dark-sync/theme.conf.template"
output_path = "/home/dot/.local/share/fcitx5/themes/noctalia-inflex-dark-sync/theme.conf"

[templates.fcitx5_inflex_dark_panel]
input_path = "/home/dot/.dotfiles/home/dot/fcitx5/templates/noctalia-inflex-dark-sync/panel.svg.template"
